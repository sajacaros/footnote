name: footnote_walk
description: A map-first dog walking journal for Android.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^7.0.2
  geolocator: ^13.0.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  latlong2: ^0.9.1
  media_store_plus: ^0.1.3
  path: ^1.9.0
  path_provider: ^2.1.4
  photo_manager: ^3.9.0
  photo_manager_image_provider: ^2.2.0
  share_plus: ^10.0.2
  sqflite: ^2.3.3+1
  uuid: ^4.5.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
